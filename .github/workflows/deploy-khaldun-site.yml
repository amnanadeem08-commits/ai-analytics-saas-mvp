name: Deploy Khaldun AI site

on:
  push:
    branches: [main]
    paths:
      - "khaldun-ai-website/**"
      - ".github/workflows/deploy-khaldun-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: khaldun-ai-website/package-lock.json

      - name: Install
        working-directory: khaldun-ai-website
        run: npm ci

      - name: Build static export
        working-directory: khaldun-ai-website
        env:
          # Project Pages URL path = /<repo-name>
          NEXT_PUBLIC_BASE_PATH: /ai-analytics-saas-mvp
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: khaldun-ai-website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
