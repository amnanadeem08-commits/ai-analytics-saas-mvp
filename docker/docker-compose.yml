# Data Bot AI — Docker Compose (Sprint 8.5 / production hardening)
# Usage:
#   Development:  docker compose --env-file .env.example --profile dev up --build
#   Production:   copy .env.production.example → .env.production (set secrets), then:
#                 docker compose --env-file .env.production --profile prod up --build -d
#   Verify:       python verify_prod_compose.py [--live]

services:
  postgres:
    image: postgres:16-alpine
    profiles: [dev, prod]
    environment:
      POSTGRES_USER: databot
      POSTGRES_PASSWORD: databot
      POSTGRES_DB: databot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U databot -d databot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [databot]

  redis:
    image: redis:7-alpine
    profiles: [dev, prod]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [databot]

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    profiles: [dev, prod]
    env_file:
      - .env.example
    environment:
      APP_ENV: ${APP_ENV:-development}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      DATABASE_URL: postgresql://databot:databot@postgres:5432/databot
      STORAGE_BACKEND: postgres
      STORAGE_METADATA_BACKEND: ${STORAGE_METADATA_BACKEND:-sqlalchemy}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-local}
      QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - app_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/live"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [databot]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    profiles: [prod]
    env_file:
      - .env.example
    environment:
      APP_ENV: ${APP_ENV:-development}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      DATABASE_URL: postgresql://databot:databot@postgres:5432/databot
      STORAGE_BACKEND: postgres
      STORAGE_METADATA_BACKEND: ${STORAGE_METADATA_BACKEND:-sqlalchemy}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-local}
      QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      WORKER_ENABLED: "true"
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - app_data:/app/data
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [databot]

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    profiles: [dev, prod]
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks: [databot]

networks:
  databot:
    driver: bridge

volumes:
  postgres_data:
  app_data:
